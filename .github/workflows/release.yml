name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    name: Build and Release Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd plugin/vibe
          npm ci --omit=dev

      - name: Package Plugin
        run: |
          cd plugin/vibe
          # Package all files including node_modules and dot folders
          # gemini-extension.json must be at the root of the archive
          zip -r ../../vibe-plugin.zip . -x "*.git*" "*.DS_Store"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vibe-plugin.zip
            .agents/plugins/codex-marketplace.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
