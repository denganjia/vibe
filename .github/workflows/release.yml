name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: vibe
            name: vibe-macos-x64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: vibe
            name: vibe-macos-arm64.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: vibe
            name: vibe-linux-x64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: vibe.exe
            name: vibe-windows-x64.zip

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }} -p vibe-cli

      - name: Rename Binary (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: mv target/${{ matrix.platform.target }}/release/vibe-cli target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}

      - name: Rename Binary (Windows)
        if: matrix.platform.os == 'windows-latest'
        run: mv target/${{ matrix.platform.target }}/release/vibe-cli.exe target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}

      - name: Package (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czf ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}

      - name: Package (Windows)
        if: matrix.platform.os == 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          7z a ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: ${{ matrix.platform.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
